<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Online Banking</title>
    <link rel="stylesheet" href="css/stylesheet.css">
</head>
<body>
    <div id="background-banner-page">
        <div id="login-box-container">
            <p id="login-text">Online Banking Login</p>
            <p id="user-id-text">User ID</p>
            <input type="text" id="username-box" class="input-field" >
            <p id="password-text">Password</p>
            <input type="password" id="password-box" class="input-field" >
            <button id="login-button">LOG IN</button>
            <p id="forgot-login-text"><a href="index.html">Forgot login</a>?</p>
            <p id="register-text">First time user? <a href="index.html">Register.</a></p>
        </div>
    </div>
    <script type="text/javascript" src="js/app.js"></script>

</body>
</html>
